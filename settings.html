<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings - Medical POS</title>

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="settings.css">

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>HAFIZ MEDICAL STORE</h2>

        <ul>

            <li>
                <a href="index.html">Billing</a>
            </li>

            <li>
                <a href="inventory.html">Inventory</a>
            </li>

            <li>
                <a href="reports.html">Reports</a>
            </li>

            <li>
                <a href="calculator.html">Calculator</a>
            </li>

            <li class="active">
                <a href="settings.html">Settings</a>
            </li>

        </ul>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <!-- HEADER CARD -->

        <div class="cards">

            <div class="card">

                <h2>⚙️ Settings Panel</h2>

                <p>Manage your pharmacy system</p>

            </div>

        </div>

        <!-- SHOP INFO -->

        <div class="settings-card">

            <h3>🏥 Shop Information</h3>

            <input type="text" id="shopName" placeholder="Shop Name">

            <input type="text" id="shopPhone" placeholder="Phone Number">

            <input type="text" id="shopAddress" placeholder="Address">

            <button onclick="saveSettings()">
                Save
            </button>

        </div>

        <!-- SETTINGS GRID -->

        <div class="settings-grid">

            <!-- THEME -->

            <div class="settings-card">

                <h3>🌙 Theme</h3>

                <div class="setting-row">

                    <span>Dark Mode</span>

                    <label class="switch">

                        <input type="checkbox" id="darkModeToggle">

                        <span class="slider"></span>

                    </label>

                </div>

            </div>

            <!-- INVOICE -->

            <div class="settings-card" style="display: none;">

                <h3>🧾 Invoice Settings</h3>

                <input type="text" id="invoicePrefix" placeholder="Invoice Prefix">

                <div class="setting-row">

                    <span>Auto Print</span>

                    <input type="checkbox" id="autoPrint">

                </div>

                <button onclick="saveSettings()">
                    Save
                </button>

            </div>

        </div>

        <!-- BACKUP -->

        <div class="settings-card">

            <h3>💾 Backup System</h3>

            <button onclick="downloadBackup()">
                ⬇ Download Backup
            </button>

            <button onclick="uploadBackup()">
                ⬆ Restore Backup
            </button>

        </div>

    </div>

    <script src="settings.js"></script>

</body>

</html>
